# Custom pg_hba.conf for development environment.
#
# LOCAL Unix-socket connections use TRUST auth so that
# reconcile_dev_credentials.sh can always connect and fix password
# drift — even when the volume retains an old password.
#
# TCP/IP connections require scram-sha-256 (password) to protect
# inter-container traffic on the Docker network.

# TYPE   DATABASE   USER   ADDRESS         METHOD
local    all        all                     trust
host     all        all    0.0.0.0/0       scram-sha-256
host     all        all    ::/0            scram-sha-256
