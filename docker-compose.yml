services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: fcg3-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - data-network

  fastapi-app:
    build: ./backend
    container_name: fcg3-api
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
      MCP_SERVICE_TOKEN: ${MCP_SERVICE_TOKEN}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH}
      FASTAPI_URL: ${FASTAPI_URL}
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  langchain-service:
    build: ./ai_service
    container_name: fcg3-ai
    ports:
      - "8001:8001"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
      MCP_SERVICE_TOKEN: ${MCP_SERVICE_TOKEN}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH}
      FASTAPI_URL: ${FASTAPI_URL}
    volumes:
      - ./ai_service:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  mcp-server:
    build: ./mcp_server
    container_name: fcg3-mcp
    ports:
      - "8002:8002"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
      MCP_SERVICE_TOKEN: ${MCP_SERVICE_TOKEN}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN}
      WHATSAPP_APP_SECRET: ${WHATSAPP_APP_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER}
      LLM_MODEL: ${LLM_MODEL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH}
      FASTAPI_URL: ${FASTAPI_URL}
    volumes:
      - ./mcp_server:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

networks:
  app-network:
    driver: bridge
  data-network:
    driver: bridge

volumes:
  postgres_data:
